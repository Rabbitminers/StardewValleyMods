name: Bug Report
description: Report an issue with one of the mods in this collection
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below to help us fix the issue faster.
  - type: dropdown
    id: mod_name
    attributes:
      label: Which mod is this about?
      description: Select the mod where the issue is occurring.
      options:
        - Where's My Stuff?
        - A Packet of Lost Crops
    validations:
      required: true

  - type: input
    id: mod_version
    attributes:
      label: Mod Version
      description: What version of the selected mod are you using?
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: smapi_version
    attributes:
      label: SMAPI Version
      description: What version of SMAPI are you running?
      placeholder: "e.g. 4.0.0"
    validations:
      required: true

  - type: input
    id: game_version
    attributes:
      label: Stardew Valley Version
      description: What version of Stardew Valley are you playing?
      placeholder: "e.g. 1.6.8"
    validations:
      required: true

  - type: textarea
    id: bug_description
    attributes:
      label: What happened?
      description: Describe the issue you’re experiencing.
      placeholder: "Describe the problem clearly..."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Please include steps so we can reproduce the issue.
      placeholder: |
        1. Launch the game
        2. Use the mod feature
        3. Observe the issue
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: SMAPI Log (if available)
      description: Paste your SMAPI log here if relevant.
      render: shell

  - type: textarea
    id: additional_context
    attributes:
      label: Additional information
      description: Screenshots, mod list, or anything else that might help.